<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slime Maze</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a1a;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}
canvas { display: block; border-radius: 10px; box-shadow: 0 6px 28px rgba(0,0,0,0.5); }
#hud-area { display: flex; flex-direction: column; align-items: center; gap: 0; margin-top: 5px; width: 880px; }
#top-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; width: 100%; margin-bottom: 4px; }
#controls-left  { text-align: left; }
#controls-right { text-align: right; }
#objective      { color: #d0d0d0; font: 11px monospace; letter-spacing: 0.3px; }
#controls-left  { color: #777;    font: 11px monospace; letter-spacing: 0.3px; }
#controls-right { color: #777;    font: 11px monospace; letter-spacing: 0.3px; }
#btns  { margin-top: 2px; display: flex; align-items: center; gap: 6px; }
#mode-outer { display: flex; flex-direction: column; align-items: center; gap: 3px; margin-top: 4px; }
#mode-row  { display: flex; align-items: flex-start; gap: 6px; color: #666; font: 11px monospace; letter-spacing: 0.3px; }
#mode-label { margin-top: 4px; }
#mode-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
#restart-btn, #newmaze-btn, #cheatsheet-btn {
  background: none; border: 1px solid #555; color: #888;
  font: 11px monospace; padding: 3px 10px; border-radius: 4px;
  cursor: pointer; letter-spacing: 0.3px;
}
#restart-btn:hover, #newmaze-btn:hover, #cheatsheet-btn:hover { border-color: #999; color: #bbb; }
#mode-toggle {
  display: inline-flex; border: 1px solid #555; border-radius: 4px;
  overflow: hidden; font: 11px monospace; letter-spacing: 0.3px;
}
#mode-toggle span {
  padding: 3px 10px; cursor: pointer; color: #777; user-select: none;
  transition: color 0.15s, background 0.15s;
}
#mode-toggle span.active { color: #aaa; background: #2a2a2a; }
#mode-toggle span:hover:not(.active) { color: #999; }
#mode-note  { color: #666; font: 10px monospace; letter-spacing: 0.3px; text-align: center; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud-area">
  <div id="top-row">
    <div id="controls-left">WASD / arrows to move</div>
    <div id="objective">reach the ★ on the edge before you dissolve</div>
    <div id="controls-right">Enter / click to inspect gate</div>
  </div>
  <div id="btns">
    <button id="restart-btn">restart [R]</button>
    <button id="newmaze-btn">new maze [N]</button>
    <button id="cheatsheet-btn">cheatsheet [C]</button>
  </div>
  <div id="mode-outer">
    <div id="mode-row"><span id="mode-label">puzzle mode:</span>
      <div id="mode-wrap">
        <div id="mode-toggle">
          <span id="toggle-compare" class="active">basic boolean</span>
          <span id="toggle-gates">logic gates</span>
        </div>
        <div id="mode-note">resets the maze</div>
      </div>
    </div>
  </div>
</div>
<script>
'use strict';

// ─── CANVAS ──────────────────────────────────────────────────────────────────
const W = 880, H = 560;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = W;
canvas.height = H;

// ─── MAP ─────────────────────────────────────────────────────────────────────
const MW = 35, MH = 35, CELL = 38;
const CX = 17, CY = 17;

// Spiral-biased maze: DFS prefers clockwise rotation around center at the edges,
// becoming random near the center — gives a spiral outer structure with maze-like core.
function buildSpiralMaze(w, h, seed) {
  const g = Array.from({ length: h }, () => new Array(w).fill(1));
  let s = seed >>> 0;
  const rnd = () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 4294967296; };

  const rw = (w - 1) / 2, rh = (h - 1) / 2; // room grid: 16×16
  const visited = Array.from({length: rh}, () => new Array(rw).fill(false));
  const crx = (rw - 1) / 2, cry = (rh - 1) / 2; // room-coord center (7.5, 7.5)
  const maxD = Math.sqrt(crx * crx + cry * cry);

  function carve(r, c) {
    visited[r][c] = true;
    g[2*r+1][2*c+1] = 0;

    const dist = Math.sqrt((r-cry)**2 + (c-crx)**2) / maxD;
    // Normalize cwAlign to [-1,1] so spiralStr is meaningful regardless of distance
    const fx = c - crx, fy = r - cry;
    const mag = Math.sqrt(fx*fx + fy*fy) || 1;
    const spiralStr = (1 - dist) * 2.8; // strong CW spiral near center, pure random at edges

    const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
    const scored = dirs
      .filter(([dr, dc]) => {
        const nr = r+dr, nc = c+dc;
        return nr>=0 && nr<rh && nc>=0 && nc<rw && !visited[nr][nc];
      })
      .map(([dr, dc]) => {
        const cwAlign = (dc * fy + dr * (-fx)) / mag; // normalized dot with CW tangent
        const weight = Math.exp(cwAlign * spiralStr) * (0.5 + rnd());
        return { dr, dc, weight };
      })
      .sort((a, b) => b.weight - a.weight);

    for (const { dr, dc } of scored) {
      const nr = r+dr, nc = c+dc;
      if (!visited[nr][nc]) {
        g[r+nr+1][c+nc+1] = 0; // open wall between (r,c) and (r+dr, c+dc)
        carve(nr, nc);
      }
    }
  }

  carve(0, 0); // start from top-left room — pure spanning tree, no loops = max dead ends
  return g;
}

// BFS shortest path through open cells; returns array of [x,y] grid coords
function bfsPath(map, w, h, sx, sy, ex, ey) {
  const prev = new Map();
  prev.set(`${sx},${sy}`, null);
  const queue = [[sx, sy]];
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  let found = false;
  while (queue.length && !found) {
    const [x, y] = queue.shift();
    for (const [dx, dy] of dirs) {
      const nx = x+dx, ny = y+dy;
      const key = `${nx},${ny}`;
      if (nx>=0 && nx<w && ny>=0 && ny<h && !prev.has(key) && map[ny][nx] !== 1) {
        prev.set(key, [x, y]);
        if (nx===ex && ny===ey) { found = true; break; }
        queue.push([nx, ny]);
      }
    }
  }
  const path = [];
  let key = `${ex},${ey}`;
  while (key) {
    const [x, y] = key.split(',').map(Number);
    path.unshift([x, y]);
    const p = prev.get(key);
    key = p ? `${p[0]},${p[1]}` : null;
  }
  return path;
}

function placeGoldenGates(map, w, h, count, seed) {
  const cands = [];
  for (let y = 1; y < h-1; y++) for (let x = 1; x < w-1; x++) {
    if (map[y][x] !== 1) continue;
    const hg = map[y][x-1]===0 && map[y][x+1]===0;
    const vg = map[y-1][x]===0 && map[y+1][x]===0;
    const nearStart  = x<=3 && y<=3;
    const nearCenter = Math.abs(x-CX)<=2 && Math.abs(y-CY)<=2;
    if ((hg||vg) && !nearStart && !nearCenter) cands.push([x,y]);
  }
  // Fully shuffle for even spread across the whole maze
  let s = seed >>> 0;
  const ri = n => { s = (Math.imul(s,1664525)+1013904223)>>>0; return (s>>>0)%n; };
  for (let i = cands.length-1; i > 0; i--) { const j=ri(i+1); [cands[i],cands[j]]=[cands[j],cands[i]]; }
  let placed = 0;
  for (let i = 0; i < cands.length && placed < count; i++) {
    const [gx, gy] = cands[i];
    // Skip if any orthogonal neighbor is already a gate
    const hasNeighborGate = [[1,0],[-1,0],[0,1],[0,-1]].some(
      ([dx,dy]) => map[gy+dy]?.[gx+dx] === 2
    );
    if (!hasNeighborGate) { map[gy][gx] = 2; placed++; }
  }
}

let runSeed = Date.now() >>> 0;
let exitPos = [1, 1];

function makeMap() {
  const s = runSeed;
  const m = buildSpiralMaze(MW, MH, s);

  // Find outer wall cells (absolute boundary) adjacent to an open inner cell — exit goes on the wall
  const edgeCandidates = []; // [ex, ey, px, py]  wall cell + adjacent open passage
  for (let c = 1; c < MW - 1; c++) {
    if (m[1][c] === 0)      edgeCandidates.push([c, 0,      c, 1]);
    if (m[MH-2][c] === 0)   edgeCandidates.push([c, MH-1,   c, MH-2]);
  }
  for (let r = 1; r < MH - 1; r++) {
    if (m[r][1] === 0)      edgeCandidates.push([0,    r, 1,    r]);
    if (m[r][MW-2] === 0)   edgeCandidates.push([MW-1, r, MW-2, r]);
  }
  // Seeded shuffle to pick a deterministic exit
  let rng = s ^ 0xDEAD5EED;
  for (let i = edgeCandidates.length - 1; i > 0; i--) {
    rng = (rng ^ (rng >>> 17)) >>> 0; rng = Math.imul(rng, 0x9e3779b9) >>> 0; rng = (rng ^ (rng >>> 15)) >>> 0;
    const j = rng % (i + 1);
    [edgeCandidates[i], edgeCandidates[j]] = [edgeCandidates[j], edgeCandidates[i]];
  }
  const [ex, ey, px, py] = edgeCandidates[0] || [1, 0, 1, 1];
  exitPos = [ex, ey];

  // BFS from center to the open passage adjacent to the exit wall cell
  const path = bfsPath(m, MW, MH, CX, CY, px, py);

  // Place mandatory gates on the outer 55% of the path (away from center)
  const passages = path.filter(([x, y]) => !((x & 1) && (y & 1)));
  const outerPassages = passages.slice(Math.floor(passages.length * 0.45));
  const mandatoryGates = 4;
  const step = Math.max(1, Math.floor(outerPassages.length / (mandatoryGates + 1)));
  for (let i = 1; i <= mandatoryGates && i * step < outerPassages.length; i++) {
    const [gx, gy] = outerPassages[i * step];
    const adj = [[1,0],[-1,0],[0,1],[0,-1]].some(([dx,dy]) => m[gy+dy]?.[gx+dx] === 2);
    if (!adj) m[gy][gx] = 2;
  }

  // Carve open a 5x5 area around center so player can move freely at start
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx2 = -2; dx2 <= 2; dx2++) {
      const cr = CY+dy, cc = CX+dx2;
      if (cr > 0 && cr < MH-1 && cc > 0 && cc < MW-1 && m[cr][cc] === 1) m[cr][cc] = 0;
    }
  }

  // Optional gates spread across the maze
  placeGoldenGates(m, MW, MH, 28, s ^ 0xBEEF1234);
  m[ey][ex] = 9;
  return m;
}
let MAP = makeMap();
let savedGates = MAP.flatMap((row, r) => row.map((v, c) => v === 2 ? [c, r] : null).filter(Boolean));

// ─── FLOOD ───────────────────────────────────────────────────────────────────
const FLOOD_RATE_BASE = 0.333;  // cells/sec (~3s per block) — normal mode
const FLOOD_RATE_MAX  = 1.5;    // cells/sec at peak (~0.67s per block) — normal mode
const floodBase = () => hardMode ? 0.25 : FLOOD_RATE_BASE; // hard: ~4s/block
const floodMax  = () => hardMode ? 0.67 : FLOOD_RATE_MAX;  // hard: ~1.5s/block at peak
let floodDepth = {};
let currentFloodDepth = -(FLOOD_RATE_BASE * 3);

const floodPassable = v => v === 0 || v === 2; // water flows through open cells and gold gates

function computeFlood() {
  floodDepth = {};
  const queue = [];
  const add = (c, r) => {
    const k = `${c},${r}`;
    if (floodPassable(MAP[r][c]) && !(k in floodDepth)) { floodDepth[k]=0; queue.push(c,r,0); }
  };
  add(CX, CY); // flood rises from center outward
  let i = 0;
  while (i < queue.length) {
    const col = queue[i++], row = queue[i++], d = queue[i++];
    for (const [dc,dr] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nc=col+dc, nr=row+dr, k=`${nc},${nr}`;
      if (nc>=0&&nc<MW&&nr>=0&&nr<MH && !(k in floodDepth) && floodPassable(MAP[nr][nc])) {
        floodDepth[k]=d+1; queue.push(nc,nr,d+1);
      }
    }
  }
}
computeFlood();

const isFlooded = (col, row) => {
  const d = floodDepth[`${col},${row}`];
  return d !== undefined && d <= currentFloodDepth;
};

// ─── EFFECTS ─────────────────────────────────────────────────────────────────
const EFFECT_META = {
  SLOW:       { label:'SLOW',        color:'#ff4444', pipe:'red',  desc:'half speed'         },
  REVERSE:    { label:'REVERSED',    color:'#ff6644', pipe:'red',  desc:'controls flipped'   },
  DARKNESS:   { label:'DARKNESS',    color:'#ff9944', pipe:'red',  desc:'darkness falls'     },
  SPEED:      { label:'SPEED',       color:'#44aaff', pipe:'blue', desc:'double speed'       },
  WATERPROOF: { label:'WATERPROOF',  color:'#44ddff', pipe:'blue', desc:'flood immunity'     },
  FREEZE:     { label:'FREEZE',      color:'#aaddff', pipe:'blue', desc:'flood pauses'       },
};
const RED_EFFECTS  = ['SLOW','REVERSE','DARKNESS'];
const BLUE_EFFECTS = ['SPEED','SPEED','WATERPROOF','WATERPROOF','FREEZE'];

let activeEffects = []; // {type, endTime}

function hasEffect(type) {
  return activeEffects.some(e => e.type===type && e.endTime > frameTime);
}
function applyEffect(type, dur=10) {
  activeEffects = activeEffects.filter(e => e.type !== type);
  activeEffects.push({ type, endTime: frameTime + dur });
}

// ─── SMOKE GATES ─────────────────────────────────────────────────────────────
let smokeGates = {}; // "col,row" → {result:'red'|'blue'|'both', endTime}

function addSmokeGate(col, row, result, redEff, blueEff) {
  smokeGates[`${col},${row}`] = { result, redEff, blueEff, spawnTime: performance.now() };
}

// ─── PUZZLE ──────────────────────────────────────────────────────────────────
const OPERATORS = ['<', '>', '==', '!=', '<=', '>='];
let gatePuzzles = {};

let hardMode = false;
let showCheatsheet = false;
let showIntro = true;
let introPage = 0; // 0 = story, 1 = how to play, 2 = puzzle diagram

const LOGIC_GATES = ['AND','OR','XOR','NAND','NOR','XNOR'];
const GATE_INFO = [
  { name:'AND',  desc:'both conditions must pass'       },
  { name:'OR',   desc:'either condition must pass'      },
  { name:'XOR',  desc:'exactly one must pass'           },
  { name:'NAND', desc:'not both — at least one fails'   },
  { name:'NOR',  desc:'neither condition passes'        },
  { name:'XNOR', desc:'same result — both pass or both fail' },
];

function evalConnector(r1, r2, connector) {
  switch(connector) {
    case '&&': case 'AND':  return r1 && r2;
    case '||': case 'OR':   return r1 || r2;
    case 'XOR':  return r1 !== r2;
    case 'NAND': return !(r1 && r2);
    case 'NOR':  return !(r1 || r2);
    case 'XNOR': return r1 === r2;
  }
  return false;
}

function makePuzzle() {
  const numPool = [2,3,4,5,6,7,8,10,12,15,18,20,25,30];
  const valPool = [1,2,3,4,5,6,8,10,12,15,18,20,25,30,35];
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  const connPool = hardMode ? LOGIC_GATES : ['&&','||'];

  // Returns true if there's at least one operator combo where blue passes but red doesn't
  // — guarantees the puzzle has a blue-only winning solution
  const hasBlueOnlySolution = (connector, n1, n2, redVal, blueVal) => {
    for (const op1 of OPERATORS) for (const op2 of OPERATORS) {
      const r1=evalOp(redVal,op1,n1),  r2=evalOp(redVal,op2,n2);
      const b1=evalOp(blueVal,op1,n1), b2=evalOp(blueVal,op2,n2);
      if (evalConnector(b1,b2,connector) && !evalConnector(r1,r2,connector)) return true;
    }
    return false;
  };

  for (let attempt = 0; attempt < 100; attempt++) {
    const connector = pick(connPool);
    const n1 = pick(numPool);
    let n2; do { n2 = pick(numPool); } while (n2 === n1);
    let redVal = pick(valPool), blueVal;
    do { blueVal = pick(valPool); } while (blueVal === redVal);
    if (!hasBlueOnlySolution(connector, n1, n2, redVal, blueVal)) continue;
    return { connector, n1, n2, redVal, blueVal, redEff: pick(RED_EFFECTS), blueEff: pick(BLUE_EFFECTS) };
  }
  const fc = hardMode ? 'XOR' : '||';
  return { connector:fc, n1:5, n2:10, redVal:3, blueVal:12, redEff:pick(RED_EFFECTS), blueEff:pick(BLUE_EFFECTS) };
}

function evalOp(x, op, n) {
  switch(op) {
    case '<':  return x < n;
    case '>':  return x > n;
    case '==': return x === n;
    case '!=': return x !== n;
    case '<=': return x <= n;
    case '>=': return x >= n;
  }
  return false;
}

function evalPuzzle(pz, val) {
  if (!pz.slot1 || !pz.slot2) return false;
  const r1 = evalOp(val, pz.slot1, pz.n1);
  const r2 = evalOp(val, pz.slot2, pz.n2);
  return evalConnector(r1, r2, pz.connector);
}

function drawCheatsheet() {
  const cw = 340;
  const ch = hardMode ? 226 : 284;
  const cx = W/2 - cw/2, cy = H/2 - ch/2;

  ctx.fillStyle = 'rgba(0,0,0,0.86)';
  ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, 10); ctx.fill();
  ctx.strokeStyle = '#c47f00'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, 10); ctx.stroke();

  const row = (label, desc, y, labelColor='#f0c040') => {
    ctx.textAlign = 'left';
    ctx.font = 'bold 12px monospace'; ctx.fillStyle = labelColor;
    ctx.fillText(label.padEnd(6), cx + 18, y);
    ctx.font = '11px monospace'; ctx.fillStyle = '#aaa';
    ctx.fillText(desc, cx + 82, y);
  };
  const section = (title, y) => {
    ctx.font = 'bold 10px monospace'; ctx.fillStyle = '#555'; ctx.textAlign = 'left';
    ctx.fillText(title, cx + 18, y);
  };
  const divider = y => {
    ctx.strokeStyle = '#2e2e2e'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx + 14, y); ctx.lineTo(cx + cw - 14, y); ctx.stroke();
  };

  ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center'; ctx.fillStyle = '#c47f00';
  ctx.fillText(hardMode ? 'LOGIC GATES  (C to close)' : 'BASIC BOOLEAN EXPRESSIONS  (C to close)', W/2, cy + 20);

  if (hardMode) {
    GATE_INFO.forEach(({ name, desc }, i) => row(name, desc, cy + 44 + i * 28));
  } else {
    section('CONNECTORS', cy + 40);
    row('&&', 'both conditions must pass', cy + 56);
    row('||', 'either condition must pass', cy + 78);
    divider(cy + 96);
    section('OPERATORS', cy + 112);
    [
      ['<',  'less than'],
      ['>',  'greater than'],
      ['==', 'equals'],
      ['!=', 'not equal'],
      ['<=', 'less than or equal'],
      ['>=', 'greater than or equal'],
    ].forEach(([name, desc], i) => row(name, desc, cy + 128 + i * 24));
  }
}

function drawIntro() {
  const cw = 460, ch = 300;
  const cx = W/2 - cw/2, cy = H/2 - ch/2;

  // Dim backdrop
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, 0, W, H);

  // Card
  ctx.fillStyle = '#0e0e0e';
  ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, 10); ctx.fill();
  ctx.strokeStyle = '#c47f00'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, 10); ctx.stroke();

  ctx.textAlign = 'center';

  if (introPage === 0) {
    // Draw a little slime blob
    const bx = W/2, by = cy + 58;
    ctx.fillStyle = '#3ecf3e';
    ctx.beginPath(); ctx.arc(bx, by, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.beginPath(); ctx.ellipse(bx - 5, by - 6, 7, 4, -0.4, 0, Math.PI*2); ctx.fill();

    ctx.font = 'bold 15px monospace'; ctx.fillStyle = '#c47f00';
    ctx.fillText('YOU ARE A SLIME.', W/2, cy + 98);

    ctx.font = '12px monospace'; ctx.fillStyle = '#aaa';
    ctx.fillText('you have escaped the laboratory.', W/2, cy + 126);
    ctx.fillText('the scientists are not pleased.', W/2, cy + 145);
    ctx.fillText('they\'ve released a flood to stop you.', W/2, cy + 164);

    // "reach the [mini exit block] on the outer edge before you dissolve."
    const rp1 = 'reach the ', rp2 = ' on the outer edge before you dissolve.';
    ctx.font = '12px monospace';
    const rw1 = ctx.measureText(rp1).width, rw2 = ctx.measureText(rp2).width;
    const rsz = 13, rtotalW = rw1 + rsz + rw2;
    const rsx = W/2 - rtotalW/2, rty = cy + 192;
    ctx.fillStyle = '#666'; ctx.textAlign = 'left';
    ctx.fillText(rp1, rsx, rty);
    // mini exit tile
    const rbx = rsx + rw1, rby2 = rty - rsz + 2;
    ctx.fillStyle = '#e84422'; ctx.fillRect(rbx, rby2, rsz, rsz);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(rbx+rsz/2, rby2+rsz/2, rsz*0.3, 0, Math.PI*2); ctx.fill();
    ctx.font = `bold ${Math.floor(rsz*0.65)}px sans-serif`;
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.fillText('★', rbx+rsz/2, rby2+rsz*0.78);
    ctx.font = '12px monospace'; ctx.fillStyle = '#666'; ctx.textAlign = 'left';
    ctx.fillText(rp2, rbx + rsz, rty);
    ctx.textAlign = 'center';

    // Page dots (3)
    ctx.fillStyle = '#c47f00'; ctx.beginPath(); ctx.arc(W/2 - 10, cy+ch-28, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';    ctx.beginPath(); ctx.arc(W/2,      cy+ch-28, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';    ctx.beginPath(); ctx.arc(W/2 + 10, cy+ch-28, 3, 0, Math.PI*2); ctx.fill();
    ctx.font = '10px monospace'; ctx.fillStyle = '#444';
    ctx.fillText('press any key  →', W/2, cy + ch - 12);

  } else if (introPage === 1) {
    ctx.font = 'bold 13px monospace'; ctx.fillStyle = '#c47f00';
    ctx.fillText('HOW TO PLAY', W/2, cy + 30);

    const row = (key, desc, y) => {
      ctx.textAlign = 'left';
      ctx.font = 'bold 11px monospace'; ctx.fillStyle = '#f0c040';
      ctx.fillText(key, cx + 30, y);
      ctx.font = '11px monospace'; ctx.fillStyle = '#aaa';
      ctx.fillText(desc, cx + 160, y);
      ctx.textAlign = 'center';
    };

    row('WASD / arrows',  'move',                          cy + 58);
    row('Enter / click',  'interact with a gate next to you',       cy + 78);
    row('R',              'restart (same maze)',            cy + 98);
    row('N',              'new maze',                       cy + 118);
    row('C',              'cheatsheet (puzzle reference)',  cy + 138);

    ctx.strokeStyle = '#2e2e2e'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx+20, cy+152); ctx.lineTo(cx+cw-20, cy+152); ctx.stroke();

    ctx.font = '11px monospace'; ctx.fillStyle = '#666';
    ctx.fillText('click a golden gate, or stand beside it and press Enter', W/2, cy + 170);
    ctx.fillText('flood rises from the center — don\'t dawdle', W/2, cy + 190);

    // Page dots (3)
    ctx.fillStyle = '#333';    ctx.beginPath(); ctx.arc(W/2 - 10, cy+ch-28, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c47f00'; ctx.beginPath(); ctx.arc(W/2,      cy+ch-28, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';    ctx.beginPath(); ctx.arc(W/2 + 10, cy+ch-28, 3, 0, Math.PI*2); ctx.fill();
    ctx.font = '10px monospace'; ctx.fillStyle = '#444';
    ctx.fillText('press any key  →', W/2, cy + ch - 12);

  } else {
    // Page 3 — puzzle visual
    ctx.font = 'bold 13px monospace'; ctx.fillStyle = '#c47f00';
    ctx.fillText('THE GATE PUZZLE', W/2, cy + 28);

    // Mini pipe + slot diagram
    const mx = cx + 30, mw = cw - 60;
    const midX = mx + mw / 2;
    const pipeY = cy + 46, pipeH = 52;
    const pipeW = 120;

    // Blue pipe (left)
    ctx.fillStyle = '#080e1e';
    ctx.beginPath(); ctx.roundRect(mx, pipeY, pipeW, pipeH, 6); ctx.fill();
    ctx.strokeStyle = '#5599ff'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.roundRect(mx, pipeY, pipeW, pipeH, 6); ctx.stroke();
    ctx.font = 'bold 11px monospace'; ctx.fillStyle = '#5599ff'; ctx.textAlign = 'center';
    ctx.fillText('x = 12', mx + pipeW/2, pipeY + 18);
    ctx.font = '10px monospace'; ctx.fillStyle = '#4488cc';
    ctx.fillText('SPEED', mx + pipeW/2, pipeY + 34);
    ctx.fillText('positive effect', mx + pipeW/2, pipeY + 47);

    // Red pipe (right)
    const rpx = mx + mw - pipeW;
    ctx.fillStyle = '#1e0808';
    ctx.beginPath(); ctx.roundRect(rpx, pipeY, pipeW, pipeH, 6); ctx.fill();
    ctx.strokeStyle = '#ff5555'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.roundRect(rpx, pipeY, pipeW, pipeH, 6); ctx.stroke();
    ctx.font = 'bold 11px monospace'; ctx.fillStyle = '#ff5555'; ctx.textAlign = 'center';
    ctx.fillText('x = 5', rpx + pipeW/2, pipeY + 18);
    ctx.font = '10px monospace'; ctx.fillStyle = '#cc4444';
    ctx.fillText('SLOW', rpx + pipeW/2, pipeY + 34);
    ctx.fillText('negative effect', rpx + pipeW/2, pipeY + 47);

    // Slot boxes in the middle
    const slotW = 34, slotH = 22, slotY = pipeY + pipeH/2 - slotH/2;
    const slot1X = midX - slotW - 28, slot2X = midX + 28;

    // Connector label
    ctx.font = 'bold 11px monospace'; ctx.fillStyle = '#888'; ctx.textAlign = 'center';
    ctx.fillText('&&', midX, slotY + 15);

    // Slot 1
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.roundRect(slot1X, slotY, slotW, slotH, 4); ctx.fill();
    ctx.strokeStyle = '#5599ff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(slot1X, slotY, slotW, slotH, 4); ctx.stroke();
    ctx.font = 'bold 12px monospace'; ctx.fillStyle = '#f0c040'; ctx.textAlign = 'center';
    ctx.fillText('?', slot1X + slotW/2, slotY + 15);

    // Slot 2
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.roundRect(slot2X, slotY, slotW, slotH, 4); ctx.fill();
    ctx.strokeStyle = '#ff5555'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(slot2X, slotY, slotW, slotH, 4); ctx.stroke();
    ctx.font = 'bold 12px monospace'; ctx.fillStyle = '#f0c040'; ctx.textAlign = 'center';
    ctx.fillText('?', slot2X + slotW/2, slotY + 15);

    // Labels under slots
    ctx.font = '9px monospace'; ctx.fillStyle = '#555'; ctx.textAlign = 'center';
    ctx.fillText('x ? 7', slot1X + slotW/2, slotY + slotH + 12);
    ctx.fillText('x ? 3', slot2X + slotW/2, slotY + slotH + 12);

    ctx.strokeStyle = '#2e2e2e'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx+20, cy+128); ctx.lineTo(cx+cw-20, cy+128); ctx.stroke();

    ctx.font = '11px monospace'; ctx.fillStyle = '#aaa'; ctx.textAlign = 'center';
    ctx.fillText('pick an operator for each slot  (<  >  ==  !=  <=  >=)', W/2, cy + 147);
    ctx.font = '11px monospace'; ctx.fillStyle = '#666';
    ctx.fillText('satisfy a condition → that pipe opens with its effect', W/2, cy + 166);
    ctx.fillText('satisfy both → both pipes open', W/2, cy + 185);
    ctx.fillText('satisfy neither → gate stays sealed', W/2, cy + 204);

    // Page dots (3)
    ctx.fillStyle = '#333';    ctx.beginPath(); ctx.arc(W/2 - 10, cy+ch-28, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';    ctx.beginPath(); ctx.arc(W/2,      cy+ch-28, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c47f00'; ctx.beginPath(); ctx.arc(W/2 + 10, cy+ch-28, 3, 0, Math.PI*2); ctx.fill();
    ctx.font = '10px monospace'; ctx.fillStyle = '#444';
    ctx.fillText('press any key to start', W/2, cy + ch - 12);
  }
}

// ─── PLAYER ──────────────────────────────────────────────────────────────────
const player  = { x: CX+0.5, y: CY+0.5, facing: [1, 0] }; // [dc, dr]
const SPEED   = 0.07;
const RADIUS  = 0.3;
let moving       = false;
let walkTimer    = 0;
let floodStarted = false;

// ─── INPUT ───────────────────────────────────────────────────────────────────
const keys = {};
function dismissIntro() {
  if (introPage < 2) { introPage++; return; }
  showIntro = false;
}

window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  // Don't register arrow keys as movement while modal is open
  if (gateModal && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
    gateModal.selectedSlot = gateModal.selectedSlot === 1 ? 2 : 1;
    return;
  }
  keys[e.key] = true;
  if (showIntro) { dismissIntro(); return; }
  if (e.key === 'c' || e.key === 'C') { showCheatsheet = !showCheatsheet; return; }
  if (!gateModal && (e.key === 'r' || e.key === 'R')) { softReset(); return; }
  if (!gateModal && (e.key === 'n' || e.key === 'N')) { reset(); return; }
  if (gateModal && gateModal.phase === 'puzzle') {
    const opKey = { ',':'<', '<':'<', '.':'>', '>':'>', '=':'==', '+':'==', '1':'!=', '!':'!=' };
    const op = opKey[e.key];
    if (op) {
      e.preventDefault();
      const m = gateModal;
      if (m.selectedSlot === 1) { m.slot1 = op; if (!m.slot2) m.selectedSlot = 2; }
      else                      { m.slot2 = op; if (!m.slot1) m.selectedSlot = 1; }
      return;
    }
    if (e.key === 'Tab' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      e.preventDefault();
      gateModal.selectedSlot = gateModal.selectedSlot === 1 ? 2 : 1;
      return;
    }
    if (e.key === 'Backspace') {
      e.preventDefault();
      const m = gateModal;
      if (m.selectedSlot === 1) m.slot1 = null;
      else m.slot2 = null;
      return;
    }
  }
  if (e.key === 'Enter' || e.key === ' ') {
    if (gateModal) {
      if (gateModal.phase === 'done') { gateModal = null; return; }
      if (gateModal.phase === 'puzzle' && gateModal.slot1 && gateModal.slot2) {
        const m = gateModal;
        const redOpen  = evalPuzzle(m, m.redVal);
        const blueOpen = evalPuzzle(m, m.blueVal);
        m.result = (redOpen && blueOpen) ? 'both' : blueOpen ? 'blue' : redOpen ? 'red' : 'none';
        resolveGate();
        gateModal = null; // close immediately — no second Enter needed
      }
      return;
    }
    if (gameWon) { reset(); return; }
    if (gameLost) { softReset(); return; }
    const mc = Math.floor(player.x), mr = Math.floor(player.y);
    const [fdc, fdr] = player.facing;
    // Check facing cell first, then other adjacent cells as fallback
    const order = [[fdc, fdr], [0,0], [-fdc,-fdr], [fdr,-fdc], [-fdr,fdc]];
    for (const [dc, dr] of order) {
      const c = mc+dc, r = mr+dr;
      if (c>=0&&c<MW&&r>=0&&r<MH && MAP[r][c]===2) { openGateModal(c, r); break; }
    }
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const {col,row} = canvasToCell(
    (e.clientX-r.left)*(W/r.width),
    (e.clientY-r.top)*(H/r.height)
  );
  canvas.style.cursor = (row>=0&&row<MH&&col>=0&&col<MW&&MAP[row][col]===2) ? 'pointer' : 'default';
});

// ─── COORDS ──────────────────────────────────────────────────────────────────
const camOff       = () => ({ cx: player.x*CELL - W/2, cy: player.y*CELL - H/2 });
const canvasToCell = (px, py) => {
  const {cx,cy} = camOff();
  return { col: Math.floor((px+cx)/CELL), row: Math.floor((py+cy)/CELL) };
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let gameWon = false, gameLost = false, frameTime = 0;
let dissolveStartTime = -1, dissolveCol = 0, dissolveRow = 0;
let winBall = null; // bouncing ball animation on win screen
let gateModal = null;
const sparks  = [];

// ─── GATE MODAL LOGIC ────────────────────────────────────────────────────────
function openGateModal(col, row) {
  const k = `${col},${row}`;
  if (!gatePuzzles[k]) gatePuzzles[k] = makePuzzle();
  const pz = gatePuzzles[k];
  gateModal = {
    col, row,
    connector: pz.connector, n1: pz.n1, n2: pz.n2,
    redVal: pz.redVal, blueVal: pz.blueVal,
    redEff: pz.redEff, blueEff: pz.blueEff,
    slot1: null, slot2: null, selectedSlot: 1,
    phase: 'puzzle', result: null,
    blueSlide: 0, redSlide: 0, slideStartTime: null,
    hitZones: {}
  };
}

function inBox(x, y, b) { return b && x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h; }

function handleModalClick(cx, cy) {
  const m = gateModal;
  if (m.phase === 'done') { gateModal = null; return; }
  const hz = m.hitZones;

  if (inBox(cx, cy, hz.slot1)) {
    if (m.selectedSlot === 1 && m.slot1) { m.slot1 = null; }
    else { m.selectedSlot = 1; }
    return;
  }
  if (inBox(cx, cy, hz.slot2)) {
    if (m.selectedSlot === 2 && m.slot2) { m.slot2 = null; }
    else { m.selectedSlot = 2; }
    return;
  }
  if (hz.ops) {
    for (const o of hz.ops) {
      if (inBox(cx, cy, o)) {
        if (m.selectedSlot === 1) { m.slot1 = o.op; if (!m.slot2) m.selectedSlot = 2; }
        else                      { m.slot2 = o.op; if (!m.slot1) m.selectedSlot = 1; }
        return;
      }
    }
  }
  if (inBox(cx, cy, hz.activate) && m.slot1 && m.slot2) {
    const redOpen  = evalPuzzle(m, m.redVal);
    const blueOpen = evalPuzzle(m, m.blueVal);
    m.result = redOpen && blueOpen ? 'both' : blueOpen ? 'blue' : redOpen ? 'red' : 'none';
    resolveGate();
  }
}

function resolveGate() {
  const m = gateModal;
  if (m.result !== 'none') {
    delete gatePuzzles[`${m.col},${m.row}`];
    MAP[m.row][m.col] = 0;
    computeFlood();
    addSmokeGate(m.col, m.row, m.result, m.redEff, m.blueEff);
    for (let i = 0; i < 12; i++) sparks.push({ col:m.col, row:m.row, p:0, angle:(i/12)*Math.PI*2 });
  }
  m.phase = 'done';
}

// ─── CLICK ───────────────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  if (showIntro) { dismissIntro(); return; }
  if (gameWon || gameLost) return;
  const r  = canvas.getBoundingClientRect();
  const cx = (e.clientX-r.left)*(W/r.width);
  const cy = (e.clientY-r.top)*(H/r.height);
  if (gateModal) { handleModalClick(cx, cy); return; }
  const {col, row} = canvasToCell(cx, cy);
  if (row>=0&&row<MH&&col>=0&&col<MW&&MAP[row][col]===2) openGateModal(col, row);
});

// ─── COLLISION ───────────────────────────────────────────────────────────────
const passable = (x, y) => {
  const mc = Math.floor(x), mr = Math.floor(y);
  if (mc<0||mc>=MW||mr<0||mr>=MH) return false;
  const cell = MAP[mr][mc];
  const floodedGate = cell === 2 && isFlooded(mc, mr); // flooded gate: not a wall, but still blocks movement unless WATERPROOF
  if (cell !== 0 && cell !== 9 && !floodedGate) return false;
  if (isFlooded(mc, mr) && !hasEffect('WATERPROOF')) return false;
  return true;
};

// ─── MOVEMENT ────────────────────────────────────────────────────────────────
function updatePlayer(dt) {
  if (gateModal||gameWon||gameLost) return;

  const rev = hasEffect('REVERSE') ? -1 : 1;
  let dx = 0, dy = 0;
  if (keys['ArrowUp']   ||keys['w']||keys['W']) dy -= rev;
  if (keys['ArrowDown'] ||keys['s']||keys['S']) dy += rev;
  if (keys['ArrowLeft'] ||keys['a']||keys['A']) dx -= rev;
  if (keys['ArrowRight']||keys['d']||keys['D']) dx += rev;

  const hasSlow = hasEffect('SLOW'), hasSpd = hasEffect('SPEED');
  const spd = (hasSlow && hasSpd) ? SPEED : hasSlow ? SPEED*0.45 : hasSpd ? SPEED*1.85 : SPEED;
  moving = dx!==0||dy!==0;
  if (moving) floodStarted = true;
  if (moving) {
    walkTimer += dt;
    // Track facing: prefer the axis with stronger input; diagonal → last single axis wins
    if (dx !== 0 && dy === 0) player.facing = [Math.sign(dx * rev), 0];
    else if (dy !== 0 && dx === 0) player.facing = [0, Math.sign(dy * rev)];
  }
  if (dx&&dy) { dx*=0.707; dy*=0.707; }
  dx *= spd; dy *= spd;

  const r = RADIUS;
  if (dx) { const nx=player.x+dx, ex=dx>0?nx+r:nx-r; if (passable(ex,player.y+r)&&passable(ex,player.y-r)) player.x=nx; }
  if (dy) { const ny=player.y+dy, ey=dy>0?ny+r:ny-r; if (passable(player.x+r,ey)&&passable(player.x-r,ey)) player.y=ny; }

  // Snap toward cell-center on the perpendicular axis so openings are easy to enter
  if (moving) {
    const snapSpd = spd * 2.2;
    if (dx && !dy) {
      const tgt = Math.floor(player.y) + 0.5;
      const diff = tgt - player.y;
      player.y += Math.sign(diff) * Math.min(Math.abs(diff), snapSpd);
    }
    if (dy && !dx) {
      const tgt = Math.floor(player.x) + 0.5;
      const diff = tgt - player.x;
      player.x += Math.sign(diff) * Math.min(Math.abs(diff), snapSpd);
    }
  }

  const mc=Math.floor(player.x), mr=Math.floor(player.y);
  if (MAP[mr]?.[mc] === 9) {
    if (!gameWon) {
      // Launch ball toward the exit wall direction
      const [ex, ey] = exitPos;
      // Cute hops toward the exit wall (not player.facing, which can be flipped by REVERSE)
      const hopSpeed = 190;
      let fx = 0, fy = 0;
      if      (ex === 0)      fx = -1;
      else if (ex === MW - 1) fx =  1;
      else if (ey === 0)      fy = -1;
      else                    fy =  1;
      winBall = { x: W/2, y: H/2, vx: fx * hopSpeed, vy: fy * hopSpeed, t: 0 };
    }
    gameWon = true;
  }
  if (!hasEffect('WATERPROOF') && isFlooded(mc, mr)) {
    if (!gameLost) { dissolveStartTime = frameTime; dissolveCol = mc; dissolveRow = mr; }
    gameLost = true;
  }

  // Walk through smoke: apply its effect then clear it
  const sk = `${mc},${mr}`;
  if (smokeGates[sk]) {
    const sg = smokeGates[sk];
    const effDur = { FREEZE: 5, DARKNESS: 5 };
    if (sg.result === 'red'  || sg.result === 'both') applyEffect(sg.redEff,  effDur[sg.redEff]  ?? 10);
    if (sg.result === 'blue' || sg.result === 'both') applyEffect(sg.blueEff, effDur[sg.blueEff] ?? 10);
    delete smokeGates[sk];
  }
}

// ─── DRAW: PIPE FOG ──────────────────────────────────────────────────────────
function drawPipe(x, y, w, h, fogColor, bgColor) {
  ctx.fillStyle = bgColor;
  ctx.fillRect(x, y, w, h);
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();

  // Soft colored fog tint over the whole area
  ctx.globalAlpha = 0.14;
  ctx.fillStyle = fogColor;
  ctx.fillRect(x, y, w, h);

  // Small smoke particles drifting upward
  for (let i = 0; i < 20; i++) {
    const speed   = 18 + (i % 6) * 8;           // px/sec varying per particle
    const xOff    = (i * (w / 20));
    const prog    = ((frameTime * speed / h + i / 20) % 1 + 1) % 1;
    const px2     = x + (xOff % w) + Math.sin(frameTime * 0.9 + i * 1.4) * (w * 0.1);
    const py2     = y + h - prog * (h + 16);     // drift upward, wrap
    const r       = 1.8 + Math.sin(frameTime * 1.2 + i * 0.9) * 0.8;
    const fade    = Math.sin(prog * Math.PI);     // fade in/out over the loop
    ctx.globalAlpha = fade * (0.18 + 0.15 * Math.sin(frameTime * 1.8 + i));
    ctx.fillStyle = fogColor;
    ctx.beginPath(); ctx.arc(px2, py2, r, 0, Math.PI * 2); ctx.fill();
  }

  // Sparkle dots — more of them, flicker independently
  for (let i = 0; i < 14; i++) {
    const blink = Math.sin(frameTime * (2.2 + i * 0.28) + i * 1.7);
    if (blink < 0.2) continue;
    const sx = x + 4 + ((i * 31 + frameTime * 9)  % Math.max(1, w - 8));
    const sy = y + 4 + ((i * 47 + frameTime * 13) % Math.max(1, h - 8));
    ctx.globalAlpha = (blink - 0.2) / 0.8 * 0.72;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(sx, sy, 1.3, 0, Math.PI * 2); ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── DRAW: HORIZ PIPE ────────────────────────────────────────────────────────
// Animated horizontal pipe segment flowing bubbles/sparkles from x1 to x2.
// flowDir: +1 = left→right, -1 = right→left
function drawHorizPipe(x1, x2, y, fogCol, bgCol, flowDir) {
  const ph = 28, py2 = y - ph/2, pipeLen = x2 - x1;
  if (pipeLen <= 0) return;
  ctx.fillStyle = bgCol;
  ctx.fillRect(x1, py2, pipeLen, ph);
  const grad = ctx.createLinearGradient(0, py2, 0, py2 + ph);
  grad.addColorStop(0,   'rgba(255,255,255,0.07)');
  grad.addColorStop(0.4, 'rgba(255,255,255,0)');
  grad.addColorStop(1,   'rgba(0,0,0,0.28)');
  ctx.fillStyle = grad;
  ctx.fillRect(x1, py2, pipeLen, ph);
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.fillRect(x1+1, py2+1, pipeLen-2, 3);
  ctx.save();
  ctx.beginPath(); ctx.rect(x1, py2, pipeLen, ph); ctx.clip();
  for (let i = 0; i < 6; i++) {
    const phase = (i/6)*Math.PI*2 + frameTime*(0.4+i*0.07);
    const progress = ((frameTime*18/pipeLen + i/6) % 1 + 1) % 1;
    const bx2 = flowDir > 0 ? x1+progress*pipeLen : x2-progress*pipeLen;
    const fw = 6 + Math.sin(phase)*2;
    ctx.globalAlpha = 0.22 + 0.22*Math.sin(phase+1.2);
    ctx.fillStyle = fogCol;
    ctx.beginPath(); ctx.ellipse(bx2, y+Math.sin(phase*1.4)*(ph*0.2), fw, fw*0.55, 0, 0, Math.PI*2); ctx.fill();
  }
  for (let i = 0; i < 4; i++) {
    const blink = Math.sin(frameTime*3+i*1.4);
    if (blink < 0) continue;
    const sx = x1 + (((i*41 + frameTime*(flowDir>0?8:-8)) % pipeLen) + pipeLen) % pipeLen;
    const sy2 = py2+4+(i%3)*((ph-8)/2);
    ctx.globalAlpha = blink*0.6;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(sx, sy2, 1.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── DRAW: GATE MODAL ────────────────────────────────────────────────────────
function drawGateModal() {
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  const mw=680, mh=470, mx=W/2-mw/2, my=H/2-mh/2;
  const m = gateModal;

  const hz = m.hitZones;
  const interactive = m.phase === 'puzzle';

  // ── Card background
  ctx.fillStyle = '#141414';
  ctx.beginPath(); ctx.roundRect(mx, my, mw, mh, 12); ctx.fill();

  // Animated gold border
  const gsh = 0.7 + 0.3*Math.sin(frameTime*2.8);
  const gGrad = ctx.createLinearGradient(mx, my, mx+mw, my+mh);
  gGrad.addColorStop(0,   `rgba(255,200,40,${gsh})`);
  gGrad.addColorStop(0.5, `rgba(200,130,0,${gsh})`);
  gGrad.addColorStop(1,   `rgba(255,200,40,${gsh})`);
  ctx.strokeStyle = gGrad; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(mx, my, mw, mh, 12); ctx.stroke();

  // Gold header bar with rivets
  const sh = 0.82 + 0.18*Math.sin(frameTime*3.2);
  ctx.fillStyle = `rgb(${Math.floor(190*sh)},${Math.floor(120*sh)},0)`;
  ctx.beginPath(); ctx.roundRect(mx, my, mw, 28, [12,12,0,0]); ctx.fill();
  for (const rx of [mx+14, mx+mw-14]) {
    ctx.fillStyle = '#1a0e00'; ctx.beginPath(); ctx.arc(rx, my+14, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,200,60,0.4)'; ctx.beginPath(); ctx.arc(rx-1, my+13, 1.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center'; ctx.fillStyle = '#1a0e00';
  ctx.fillText('GATE LOCK', W/2, my+19);

  // ── Operator button dims (used for layout math)
  const opBW = 52, opBH = 27, opGap = 5;
  const rowW2 = 3*(opBW+opGap) - opGap;

  // ── Door frame geometry first (statW depends on frameX)
  const doorW  = 100, seam = 4;
  const pillarW = 12, lintH = 14;
  const doorX  = W/2 - doorW - seam/2;
  const doorX2 = W/2 + seam/2;
  const frameX  = doorX - pillarW;
  const frameW2 = doorW*2 + seam + pillarW*2;

  // ── Side panel widths — narrow pipes with breathing room on both sides
  const pipeColW  = 120;
  const blueStatX = mx + 22;
  const statW     = pipeColW;
  const redStatX  = mx + mw - 22 - pipeColW;
  const statWR    = pipeColW;

  // ── Puzzle box layout (TOP section) — centered between side panels
  const slotW = 56, slotH = 28;
  const pboxX = W/2 - 140, pboxW = 280;   // wide enough for hint text
  const pboxY = my + 36;
  const r1Y      = pboxY + 14;
  const connY    = r1Y + slotH + 6;
  const r2Y      = connY + 22;
  const opBaseY  = r2Y + slotH + 12;
  const hintY    = opBaseY + 2*(opBH+opGap) + 10;
  const pboxH    = hintY + 14 - pboxY + 8;

  // ── Door Y/H (depend on pboxH)
  const doorY  = pboxY + pboxH + lintH + 16;
  const doorH  = my + mh - doorY - 14;
  const lintY   = doorY - lintH;
  const threshY = doorY + doorH;

  // statTop/statH computed per-panel inside drawStatusPanel (each starts at its row)

  // Evaluate current operator state
  const blueOpen = (m.slot1 && m.slot2) ? evalPuzzle(m, m.blueVal) : null;
  const redOpen  = (m.slot1 && m.slot2) ? evalPuzzle(m, m.redVal)  : null;
  const bSlide   = m.blueSlide || 0;
  const rSlide   = m.redSlide  || 0;

  // ── Puzzle box background panel
  const puzAlpha = interactive ? 1.0 : 0.22;
  ctx.save();
  ctx.globalAlpha = puzAlpha;

  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.beginPath(); ctx.roundRect(pboxX, pboxY, pboxW, pboxH, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(196,127,0,0.28)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(pboxX, pboxY, pboxW, pboxH, 8); ctx.stroke();

  // Row 1: x [slot1] n1  (blue side — centered)
  const slotCX = W/2 - slotW/2;
  ctx.font = 'bold 14px monospace'; ctx.fillStyle = '#888';
  ctx.textAlign = 'right';  ctx.fillText('x', slotCX - 8, r1Y + 20);
  ctx.textAlign = 'left';   ctx.fillText(m.n1, slotCX + slotW + 8, r1Y + 20);

  const s1sel = m.selectedSlot === 1 && interactive;
  ctx.fillStyle = s1sel ? '#1e1e1e' : '#111';
  ctx.beginPath(); ctx.roundRect(slotCX, r1Y, slotW, slotH, 5); ctx.fill();
  ctx.strokeStyle = s1sel ? '#ffffff' : m.slot1 ? '#c47f00' : '#444';
  ctx.lineWidth = s1sel ? 2 : 1.5;
  ctx.beginPath(); ctx.roundRect(slotCX, r1Y, slotW, slotH, 5); ctx.stroke();
  ctx.font = 'bold 15px monospace'; ctx.fillStyle = m.slot1 ? '#fff' : '#3a3a3a';
  ctx.textAlign = 'center'; ctx.fillText(m.slot1 || '?', slotCX + slotW/2, r1Y + 19);
  hz.slot1 = { x:slotCX-4, y:r1Y-4, w:slotW+8, h:slotH+8 };

  // Connector label (centered between rows)
  ctx.font = 'bold 15px monospace'; ctx.fillStyle = '#c47f00';
  ctx.textAlign = 'center'; ctx.fillText(m.connector, W/2, connY + 14);

  // Row 2: x [slot2] n2  (red side — centered)
  ctx.font = 'bold 14px monospace'; ctx.fillStyle = '#888';
  ctx.textAlign = 'right';  ctx.fillText('x', slotCX - 8, r2Y + 20);
  ctx.textAlign = 'left';   ctx.fillText(m.n2, slotCX + slotW + 8, r2Y + 20);

  const s2sel = m.selectedSlot === 2 && interactive;
  ctx.fillStyle = s2sel ? '#1e1a08' : '#111';
  ctx.beginPath(); ctx.roundRect(slotCX, r2Y, slotW, slotH, 5); ctx.fill();
  ctx.strokeStyle = s2sel ? '#ffffff' : m.slot2 ? '#c47f00' : '#444';
  ctx.lineWidth = s2sel ? 2 : 1.5;
  ctx.beginPath(); ctx.roundRect(slotCX, r2Y, slotW, slotH, 5); ctx.stroke();
  ctx.font = 'bold 15px monospace'; ctx.fillStyle = m.slot2 ? '#fff' : '#3a3a3a';
  ctx.textAlign = 'center'; ctx.fillText(m.slot2 || '?', slotCX + slotW/2, r2Y + 19);
  hz.slot2 = { x:slotCX-4, y:r2Y-4, w:slotW+8, h:slotH+8 };

  // Operator buttons — 2 rows of 3
  if (interactive) hz.ops = [];
  [OPERATORS.slice(0,3), OPERATORS.slice(3)].forEach((ops, ri) => {
    ops.forEach((op, i) => {
      const ox = W/2 - rowW2/2 + i*(opBW+opGap), oy = opBaseY + ri*(opBH+opGap);
      const active = m.slot1===op || m.slot2===op;
      ctx.fillStyle = active ? '#1e2030' : '#181818';
      ctx.beginPath(); ctx.roundRect(ox, oy, opBW, opBH, 5); ctx.fill();
      ctx.strokeStyle = active ? '#c47f00' : '#2e2e2e'; ctx.lineWidth = active ? 1.5 : 1;
      ctx.beginPath(); ctx.roundRect(ox, oy, opBW, opBH, 5); ctx.stroke();
      ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';
      ctx.fillStyle = active ? '#f0c040' : '#666';
      ctx.fillText(op, ox + opBW/2, oy + 18);
      if (interactive) hz.ops.push({ x:ox, y:oy, w:opBW, h:opBH, op });
    });
  });

  // Hint text
  ctx.font = '11px monospace'; ctx.textAlign = 'center';
  ctx.fillStyle = (m.slot1 && m.slot2) ? 'rgba(240,200,80,0.72)' : '#555';
  ctx.fillText('↑↓ switch slots  ·  Enter → lock in', W/2, hintY + 12);
  hz.activate = null;

  ctx.restore(); // end puzAlpha

  // ── Status panels — tall rectangles + horizontal elbow flowing into each door
  const statPanelY = my + 30;                    // just below header
  const statPanelH = threshY + 6 - statPanelY;  // down to door bottom
  const elbowY     = doorY + 40;                 // center of the horizontal elbow pipe

  const drawStatusPanel = (sx, sw, rowY, isBlue) => {
    const slide  = isBlue ? bSlide  : rSlide;
    const accent = isBlue ? '#5599ff' : '#ff5555';
    const bgCol  = isBlue ? '#0b1a32' : '#2e0c0c';
    const fogCol = isBlue ? '#5599ff' : '#ff5555';
    const val    = isBlue ? m.blueVal : m.redVal;
    const eff    = isBlue ? m.blueEff : m.redEff;
    const isLit  = slide > 0.05;

    const ph2   = 56;
    const eTop  = elbowY - ph2/2;
    const eBot  = elbowY + ph2/2;
    // inner edge of vertical column (where elbow branches off)
    const eInner = isBlue ? sx + sw : sx;
    // elbow far end (into the door passage)
    const eOuter = isBlue ? doorX + doorW * 0.6 : doorX2 + doorW * 0.4;
    const eX1    = Math.min(eInner, eOuter);
    const eLen   = Math.abs(eOuter - eInner);

    // ── Trace the full L-shape as a reusable path
    const traceLShape = () => {
      ctx.beginPath();
      if (isBlue) {
        ctx.moveTo(sx,       statPanelY);
        ctx.lineTo(eInner,   statPanelY);
        ctx.lineTo(eInner,   eTop);
        ctx.lineTo(eOuter,   eTop);
        ctx.lineTo(eOuter,   eBot);
        ctx.lineTo(eInner,   eBot);
        ctx.lineTo(eInner,   statPanelY + statPanelH);
        ctx.lineTo(sx,       statPanelY + statPanelH);
        ctx.closePath();
      } else {
        ctx.moveTo(sx + sw,  statPanelY);
        ctx.lineTo(eInner,   statPanelY);
        ctx.lineTo(eInner,   eTop);
        ctx.lineTo(eOuter,   eTop);
        ctx.lineTo(eOuter,   eBot);
        ctx.lineTo(eInner,   eBot);
        ctx.lineTo(eInner,   statPanelY + statPanelH);
        ctx.lineTo(sx + sw,  statPanelY + statPanelH);
        ctx.closePath();
      }
    };

    // ── Fog: all clipped to the L shape
    ctx.save();
    traceLShape(); ctx.clip();

    // Vertical section — use the same sparkly drawPipe as the doors
    drawPipe(sx, statPanelY, sw, statPanelH, fogCol, bgCol);

    // Horizontal pipe — sparkly smoke matching door/pipe style
    ctx.fillStyle = bgCol; ctx.fillRect(eX1, eTop, eLen, ph2);
    ctx.save();
    ctx.beginPath(); ctx.rect(eX1, eTop, eLen, ph2); ctx.clip();
    // Soft fog tint
    ctx.globalAlpha = 0.14; ctx.fillStyle = fogCol; ctx.fillRect(eX1, eTop, eLen, ph2);
    // Small smoke particles drifting in flow direction
    for (let i = 0; i < 16; i++) {
      const speed = 18 + (i % 6) * 8;
      const yOff  = (i * (ph2 / 16));
      const prog  = ((frameTime * speed / Math.max(1, eLen) + i / 16) % 1 + 1) % 1;
      const px2   = isBlue ? eX1 + prog * (eLen + 16) : eX1 + eLen - prog * (eLen + 16);
      const py2   = eTop + (yOff % ph2) + Math.sin(frameTime * 0.9 + i * 1.4) * (ph2 * 0.1);
      const r     = 1.8 + Math.sin(frameTime * 1.2 + i * 0.9) * 0.8;
      const fade  = Math.sin(prog * Math.PI);
      ctx.globalAlpha = fade * (0.18 + 0.15 * Math.sin(frameTime * 1.8 + i));
      ctx.fillStyle = fogCol;
      ctx.beginPath(); ctx.arc(px2, py2, r, 0, Math.PI * 2); ctx.fill();
    }
    // Sparkle dots — flicker independently
    for (let i = 0; i < 10; i++) {
      const blink = Math.sin(frameTime * (2.2 + i * 0.28) + i * 1.7);
      if (blink < 0.2) continue;
      const sx2 = eX1 + 4 + ((i * 31 + frameTime * 9)  % Math.max(1, eLen - 8));
      const sy2 = eTop + 4 + ((i * 47 + frameTime * 13) % Math.max(1, ph2  - 8));
      ctx.globalAlpha = (blink - 0.2) / 0.8 * 0.72;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(sx2, sy2, 1.3, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.restore();

    // ── Cylindrical shading: vertical (left/right) + horizontal (top/bottom)
    // Vertical
    const vcg = ctx.createLinearGradient(sx, 0, sx+sw, 0);
    if (isBlue) {
      vcg.addColorStop(0,    'rgba(255,255,255,0.28)');
      vcg.addColorStop(0.18, 'rgba(255,255,255,0.06)');
      vcg.addColorStop(0.5,  'rgba(0,0,0,0.0)');
      vcg.addColorStop(1,    'rgba(0,0,0,0.55)');
    } else {
      vcg.addColorStop(0,    'rgba(0,0,0,0.55)');
      vcg.addColorStop(0.5,  'rgba(0,0,0,0.0)');
      vcg.addColorStop(0.82, 'rgba(255,255,255,0.06)');
      vcg.addColorStop(1,    'rgba(255,255,255,0.28)');
    }
    ctx.fillStyle = vcg; ctx.fillRect(sx, statPanelY, sw, statPanelH);

    // Horizontal
    const hcg = ctx.createLinearGradient(0, eTop, 0, eBot);
    hcg.addColorStop(0,    'rgba(255,255,255,0.28)');
    hcg.addColorStop(0.18, 'rgba(255,255,255,0.06)');
    hcg.addColorStop(0.55, 'rgba(0,0,0,0.0)');
    hcg.addColorStop(1,    'rgba(0,0,0,0.52)');
    ctx.fillStyle = hcg; ctx.fillRect(eX1, eTop, eLen, ph2);

    // Soft specular strip (no harsh white line)
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    if (isBlue) ctx.fillRect(sx+3, statPanelY+8, 3, statPanelH-16);
    else        ctx.fillRect(sx+sw-6, statPanelY+8, 3, statPanelH-16);
    ctx.fillRect(eX1+3, eTop+3, eLen-6, 2);  // top of horizontal

    ctx.restore(); // end L-shape clip

    // ── Single continuous border around the whole L shape
    traceLShape();
    ctx.strokeStyle = isLit ? accent : accent + '55';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // ── Info box floating at rowY — inline with its inequality
    const pad = 8, infoH = 62;
    const infoY = rowY - 5;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.beginPath(); ctx.roundRect(sx+pad, infoY, sw-pad*2, infoH, 5); ctx.fill();

    ctx.textAlign = 'center';
    if (isLit) { ctx.save(); ctx.shadowColor = accent; ctx.shadowBlur = 10; }
    ctx.font = 'bold 20px monospace';
    ctx.fillStyle = isLit ? accent : '#999';
    ctx.fillText(`x = ${val}`, sx+sw/2, infoY + 22);
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = isLit ? '#ffffff' : '#555';
    ctx.fillText(EFFECT_META[eff].label, sx+sw/2, infoY + 41);
    ctx.font = '10px monospace';
    ctx.fillStyle = isLit ? '#aabbcc' : '#3a3a3a';
    ctx.fillText(EFFECT_META[eff].desc, sx+sw/2, infoY + 56);
    if (isLit) ctx.restore();
  };

  drawStatusPanel(blueStatX, statW,  r2Y, true);
  drawStatusPanel(redStatX,  statWR, r2Y, false);

  // ── Door passages — animated pipe fog visible behind the sliding doors
  ctx.save();
  ctx.beginPath(); ctx.rect(doorX, doorY, doorW, doorH); ctx.clip();
  drawPipe(doorX, doorY, doorW, doorH, '#5599ff', '#0b1a32');
  ctx.restore();

  ctx.save();
  ctx.beginPath(); ctx.rect(doorX2, doorY, doorW, doorH); ctx.clip();
  drawPipe(doorX2, doorY, doorW, doorH, '#ff5555', '#2e0c0c');
  ctx.restore();

  // When both doors open the passages blend into purple
  const purpleBlend = Math.min(bSlide, rSlide);
  if (purpleBlend > 0.02) {
    ctx.save();
    ctx.globalAlpha = purpleBlend;
    ctx.beginPath(); ctx.rect(doorX, doorY, doorW*2+seam, doorH); ctx.clip();
    drawPipe(doorX, doorY, doorW*2+seam, doorH, '#cc55ff', '#1a0a28');
    ctx.restore();
  }

  // ── Door panels (each slides upward into the lintel when opened)
  const easeOut = t => 1 - Math.pow(1-t, 3); // cubic ease-out

  const drawDoorPanel = (dx, isBlue, slide) => {
    if (slide >= 1) return; // fully open — panel gone

    const accent  = isBlue ? '#5599ff' : '#ff5555';
    const corners = isBlue ? [4,0,0,4] : [0,4,4,0];
    const slideY  = doorY - easeOut(slide) * (doorH + lintH + 2);

    ctx.save();
    ctx.beginPath(); ctx.rect(dx, lintY, doorW, doorH + lintH); ctx.clip();

    const willOpen  = isBlue ? blueOpen===true : redOpen===true;
    const hasInput  = isBlue ? !!m.slot1 : !!m.slot2;

    const gg = ctx.createLinearGradient(dx, slideY, dx+doorW, slideY+doorH);
    gg.addColorStop(0,    '#b07810');
    gg.addColorStop(0.25, '#c89028');
    gg.addColorStop(0.65, '#9a6400');
    gg.addColorStop(1,    '#6a3c00');
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.roundRect(dx, slideY, doorW, doorH, corners); ctx.fill();

    ctx.strokeStyle = '#c4880a'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(dx, slideY, doorW, doorH, corners); ctx.stroke();

    ctx.strokeStyle = 'rgba(200,160,40,0.22)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(dx+5, slideY+5, doorW-10, doorH-10, corners); ctx.stroke();

    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1;
    for (let i = 1; i < 3; i++) {
      const lx2 = dx + (doorW/3)*i;
      ctx.beginPath(); ctx.moveTo(lx2, slideY+14); ctx.lineTo(lx2, slideY+doorH-14); ctx.stroke();
    }

    const ax = dx + doorW/2, ay = slideY + 28;
    ctx.fillStyle = 'rgba(255,255,255,0.60)';
    ctx.beginPath();
    ctx.moveTo(ax,      ay - 11);
    ctx.lineTo(ax - 11, ay + 4);
    ctx.lineTo(ax + 11, ay + 4);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.42)';
    ctx.fillRect(ax-3, ay+4, 6, 9);

    ctx.restore();
  };

  drawDoorPanel(doorX,  true,  bSlide);
  drawDoorPanel(doorX2, false, rSlide);

  // ── Door frame (lintel, pillars, threshold) — drawn on top of door panels
  const lg = ctx.createLinearGradient(0, lintY, 0, lintY+lintH);
  lg.addColorStop(0, '#c08820');
  lg.addColorStop(1, '#8a5800');
  ctx.fillStyle = lg;
  ctx.fillRect(frameX, lintY, frameW2, lintH);
  ctx.fillStyle = 'rgba(210,160,30,0.35)';
  ctx.fillRect(frameX, lintY, frameW2, 3);
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.fillRect(frameX, lintY+lintH-3, frameW2, 3);

  const pg = ctx.createLinearGradient(0, 0, pillarW, 0);
  pg.addColorStop(0,   '#a07000');
  pg.addColorStop(0.4, '#c08820');
  pg.addColorStop(1,   '#7a4800');
  ctx.fillStyle = pg;
  ctx.fillRect(frameX, doorY, pillarW, doorH);
  const pg2 = ctx.createLinearGradient(frameX+frameW2-pillarW, 0, frameX+frameW2, 0);
  pg2.addColorStop(0,   '#7a4800');
  pg2.addColorStop(0.6, '#c08820');
  pg2.addColorStop(1,   '#a07000');
  ctx.fillStyle = pg2;
  ctx.fillRect(frameX+frameW2-pillarW, doorY, pillarW, doorH);
  ctx.strokeStyle = '#c4880a'; ctx.lineWidth = 1;
  ctx.strokeRect(frameX, doorY, pillarW, doorH);
  ctx.strokeRect(frameX+frameW2-pillarW, doorY, pillarW, doorH);

  ctx.fillStyle = '#c47f00';
  ctx.fillRect(frameX, threshY, frameW2, 8);
  ctx.strokeStyle = '#ffdd60'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(frameX, threshY); ctx.lineTo(frameX+frameW2, threshY); ctx.stroke();
}


// ─── DRAW: SLIME CHARACTER ───────────────────────────────────────────────────
function drawSlime(wx, wy) {
  const R   = RADIUS * CELL;
  const bob = moving ? Math.sin(walkTimer * 13) * 2.5 : Math.sin(frameTime * 2) * 1.0;
  const sx  = moving ? 1 + Math.abs(Math.sin(walkTimer * 13)) * 0.13 : 1;
  const sy  = moving ? 1 - Math.abs(Math.sin(walkTimer * 13)) * 0.09 : 1;

  ctx.save();
  ctx.translate(wx, wy + bob);
  ctx.scale(sx, sy);

  // Glow ring from active effects
  const now = frameTime;
  const effs = activeEffects.filter(e => e.endTime > now);
  if (effs.length > 0) {
    const hasRed  = effs.some(e => EFFECT_META[e.type].pipe === 'red');
    const hasBlue = effs.some(e => EFFECT_META[e.type].pipe === 'blue');
    const glowCol = (hasRed && hasBlue) ? '#cc44ff' : hasRed ? '#ff4444' : '#4488ff';
    // Find soonest expiry for blink timing
    const soonest = effs.reduce((a,b) => a.endTime < b.endTime ? a : b);
    const timeLeft = soonest.endTime - now;
    const blinking = timeLeft < 2.5;
    const show = blinking ? Math.sin(now * 9) > 0 : true;
    if (show) {
      ctx.shadowColor = glowCol;
      ctx.shadowBlur  = 14;
      ctx.strokeStyle = glowCol;
      ctx.lineWidth   = 3;
      ctx.globalAlpha = 0.85;
      ctx.beginPath(); ctx.arc(0, 0, R + 5, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.shadowBlur  = 0;
    }
  }

  // Body
  ctx.fillStyle = '#3ecf3e';
  ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI*2); ctx.fill();

  // Sheen
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.beginPath(); ctx.ellipse(-R*.22, -R*.28, R*.36, R*.22, -0.4, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ─── DRAW: MAZE ──────────────────────────────────────────────────────────────
function drawMaze() {
  const {cx:camX, cy:camY} = camOff();
  ctx.save();
  ctx.translate(-camX, -camY);
  ctx.beginPath(); ctx.rect(camX, camY, W, H); ctx.clip();

  ctx.fillStyle = '#f2f2f2';
  ctx.fillRect(camX, camY, W, H);

  for (let row = 0; row < MH; row++) {
    for (let col = 0; col < MW; col++) {
      const cell    = MAP[row][col];
      const px      = col*CELL, py = row*CELL;
      const flooded = isFlooded(col, row);
      const depth   = floodDepth[`${col},${row}`];
      const solid   = flooded && currentFloodDepth >= (depth ?? 0) + 1;
      const warning = !flooded && depth !== undefined && depth <= currentFloodDepth + 1.6;
      const sgKey   = `${col},${row}`;
      const sg      = smokeGates[sgKey];

      if (cell === 1) {
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(px, py, CELL, CELL);
        ctx.fillStyle = '#363636';
        ctx.fillRect(px, py, CELL-2, CELL-2);

      } else if (flooded && (cell !== 2 || solid)) {
        if (hasEffect('FREEZE')) {
          // Ice: static pale blue-white with crack lines
          ctx.fillStyle = '#a8d8f0';
          ctx.fillRect(px, py, CELL, CELL);
          // Highlight sheen
          ctx.fillStyle = 'rgba(255,255,255,0.45)';
          ctx.fillRect(px+2, py+2, CELL-4, 6);
          // Crack lines (seeded per-cell, static)
          const cr = (col * 7 + row * 13) % 4;
          ctx.strokeStyle = 'rgba(160,210,240,0.7)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          if (cr === 0) { ctx.moveTo(px+8,  py+6);  ctx.lineTo(px+20, py+18); ctx.lineTo(px+14, py+30); }
          if (cr === 1) { ctx.moveTo(px+24, py+4);  ctx.lineTo(px+16, py+16); ctx.lineTo(px+26, py+28); }
          if (cr === 2) { ctx.moveTo(px+6,  py+20); ctx.lineTo(px+18, py+12); ctx.lineTo(px+28, py+22); }
          if (cr === 3) { ctx.moveTo(px+10, py+28); ctx.lineTo(px+22, py+16); ctx.lineTo(px+30, py+8);  }
          ctx.stroke();
          // Faint inner border
          ctx.strokeStyle = 'rgba(200,235,255,0.5)';
          ctx.lineWidth = 1;
          ctx.strokeRect(px+1, py+1, CELL-2, CELL-2);
        } else {
          const w1 = 0.5 + 0.5*Math.sin(frameTime*2.0 + col*.8 + row*.6);
          const w2 = 0.5 + 0.5*Math.sin(frameTime*1.4 + col*.5 - row*.7 + 1.8);
          ctx.fillStyle = `rgb(${Math.floor(30+w1*14)},${Math.floor(100+w2*18)},${Math.floor(210+w1*14)})`;
          ctx.fillRect(px, py, CELL, CELL);
          ctx.fillStyle = `rgba(180,220,255,${0.22+w2*.14})`;
          ctx.fillRect(px + Math.floor(w1*(CELL-8)), py+4, 3, CELL-8);
        }

      } else if (warning && !hasEffect('FREEZE') && cell !== 2) {
        const pulse = 0.10 + 0.08*Math.sin(frameTime*4.5);
        ctx.fillStyle = `rgba(60,130,220,${pulse})`;
        ctx.fillRect(px, py, CELL, CELL);

      } else if (cell === 2) {
        const sh = 0.75 + 0.25*Math.sin(frameTime*3.2 + col*.8 + row*.5);
        ctx.fillStyle = '#c47f00';
        ctx.fillRect(px, py, CELL, CELL);
        ctx.fillStyle = `rgba(255,195,30,${sh*.85})`;
        ctx.fillRect(px+2, py+2, CELL-4, CELL-4);
        ctx.fillStyle = `rgba(200,140,0,${sh*.6})`;
        for (let i = 0; i < 3; i++) ctx.fillRect(px+5+i*((CELL-10)/2), py+2, 3, CELL-4);
        ctx.strokeStyle = `rgba(255,210,60,${sh})`;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(px+1, py+1, CELL-2, CELL-2);
        // Warning: subtle blue tint on top of still-visible gate
        if (warning && !hasEffect('FREEZE')) {
          const pulse = 0.08 + 0.06*Math.sin(frameTime*4.5);
          ctx.fillStyle = `rgba(60,130,220,${pulse})`;
          ctx.fillRect(px, py, CELL, CELL);
        }
        // Flooded but not yet solid — blue water overlay on top of the gate
        if (flooded) {
          const w1 = 0.5 + 0.5*Math.sin(frameTime*2.0 + col*.8 + row*.6);
          ctx.fillStyle = `rgba(30,100,210,${0.45 + w1*0.15})`;
          ctx.fillRect(px, py, CELL, CELL);
        }

      } else if (cell === 9) {
        const pulse = 0.5 + 0.5*Math.sin(frameTime*2.5);
        ctx.fillStyle = flooded ? '#1a3060' : '#e84422';
        ctx.fillRect(px, py, CELL, CELL);
        if (flooded) {
          // Water ripple over exit
          const w1 = 0.5 + 0.5*Math.sin(frameTime*2.0 + col*.8 + row*.6);
          ctx.fillStyle = `rgba(30,100,210,${0.35 + w1*0.15})`;
          ctx.fillRect(px, py, CELL, CELL);
        } else {
          ctx.fillStyle = `rgba(255,255,255,${0.15+pulse*.2})`;
          ctx.beginPath(); ctx.arc(px+CELL/2, py+CELL/2, CELL*.38+pulse*2.5, 0, Math.PI*2); ctx.fill();
        }
        ctx.font = `bold ${Math.floor(CELL*.52)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillStyle = flooded ? `rgba(255,255,255,${0.4+pulse*0.3})` : '#fff';
        ctx.fillText('★', px+CELL/2, py+CELL/2+7);
      }

      // Smoke gate — persists until walked through (skip if flooded, water covers it)
      if (sg && !flooded) {
        const smColors = { red:'255,55,55', blue:'44,130,255', both:'170,44,255' };
        const sc = smColors[sg.result] || '170,44,255';
        // Solid tinted floor
        ctx.fillStyle = `rgba(${sc},0.55)`;
        ctx.fillRect(px, py, CELL, CELL);
        // Animated shimmer
        const shimmer = 0.25 + 0.2*Math.sin(frameTime*3.5 + col*0.7 + row*0.5);
        ctx.fillStyle = `rgba(${sc},${shimmer})`;
        ctx.fillRect(px+2, py+2, CELL-4, CELL-4);
        // Floating particles
        for (let p = 0; p < 5; p++) {
          const px2 = px + 4 + ((p*13 + frameTime*16) % (CELL-8));
          const py2 = py + 4 + ((p*19 + frameTime*11) % (CELL-8));
          ctx.globalAlpha = 0.4 + 0.35*Math.sin(frameTime*2.5+p*1.3);
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(px2, py2, 1.8, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
    }
  }

  // Dissolve effect — slime spreads through flood water on death
  if (gameLost && dissolveStartTime >= 0) {
    const elapsed = frameTime - dissolveStartTime;
    const spreadR = elapsed * 3.5 + 0.5; // start at 0.5 so death cell is instant
    for (let row = 0; row < MH; row++) {
      for (let col = 0; col < MW; col++) {
        if (!isFlooded(col, row)) continue;
        const dist = Math.sqrt((col - dissolveCol) ** 2 + (row - dissolveRow) ** 2);
        const fadeZone = 2.5;
        if (dist > spreadR + fadeZone) continue;
        // t=0 at death cell (pure green), t=1 at spread edge (blue-green)
        const t = Math.min(1, dist / Math.max(1, spreadR));
        // soft edge: fade in over fadeZone cells
        const edgeFade = dist < spreadR ? 1 : 1 - (dist - spreadR) / fadeZone;
        const r = Math.round(62  * (1-t) + 30  * t);
        const g = Math.round(207 * (1-t) + 150 * t);
        const b = Math.round(62  * (1-t) + 190 * t);
        ctx.fillStyle = `rgba(${r},${g},${b},${(0.72 - t * 0.25) * edgeFade})`;
        ctx.fillRect(col*CELL, row*CELL, CELL, CELL);
      }
    }
  }

  // Spark animations
  for (const sp of sparks) {
    const px2 = sp.col*CELL+CELL/2, py2 = sp.row*CELL+CELL/2;
    const dist = sp.p * CELL * 1.6;
    ctx.fillStyle = `rgba(255,210,30,${1-sp.p})`;
    ctx.beginPath();
    ctx.arc(px2+Math.cos(sp.angle)*dist, py2+Math.sin(sp.angle)*dist, 4*(1-sp.p*.6), 0, Math.PI*2);
    ctx.fill();
  }

  if (!gameWon) drawSlime(player.x * CELL, player.y * CELL);
  ctx.restore();
}

// ─── DRAW: HUD ────────────────────────────────────────────────────────────────
function drawHUD() {
  // Compute real flood % = flooded open cells / total floodable open cells
  const totalFloodable = Object.keys(floodDepth).length || 1;
  const floodedCount   = Object.values(floodDepth).filter(d => d <= currentFloodDepth).length;
  const floodPct       = Math.min(1, Math.max(0, floodedCount / totalFloodable));
  const pctLabel       = `${Math.round(floodPct * 100)}% flooded`;

  const barColor = floodPct < .4 ? '#3a9eea' : floodPct < .7 ? '#1e78d4' : '#0e50b8';

  const bx=W/2-110, by=13, bw=220, bh=9;
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.roundRect(bx-1,by-1,bw+2,bh+2,4); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,3); ctx.fill();
  if (floodPct > 0) {
    ctx.fillStyle = barColor;
    ctx.beginPath(); ctx.roundRect(bx,by,bw*floodPct,bh,3); ctx.fill();
  }

  ctx.font = '10px monospace'; ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(60,140,230,0.85)'; ctx.fillText(pctLabel, W/2, by-2);
  ctx.textAlign = 'center';

  if (!floodStarted) {
    ctx.font = '11px monospace'; ctx.fillStyle = 'rgba(60,140,230,0.6)';
    ctx.fillText(`reach the ★ on the edge`, W/2, by+bh+15);
  } else if (currentFloodDepth < 0) {
    const secsLeft = Math.ceil(-currentFloodDepth / floodBase());
    ctx.font = '11px monospace'; ctx.fillStyle = 'rgba(60,140,230,0.9)';
    ctx.fillText(`flood in ${secsLeft}s  ·  reach the ★ on the edge`, W/2, by+bh+15);
  } else {
    // Timer until the next depth layer floods
    const elapsed = currentFloodDepth / floodBase();
    const rampFrac = Math.min(1, elapsed / 45);
    const currentRate = floodBase() + (floodMax() - floodBase()) * rampFrac;
    const depthToNext = (Math.floor(currentFloodDepth) + 1) - currentFloodDepth;
    const secsToNext = depthToNext / currentRate;
    ctx.font = '11px monospace';
    const timerStr = `next block in ${secsToNext.toFixed(1)}s`;
    const suffix = `  ·  reach the ★ on the edge`;
    const timerCol = secsToNext <= 0.5 ? 'rgba(220,60,60,0.9)' : 'rgba(80,150,220,0.75)';
    const totalW2 = ctx.measureText(timerStr + suffix).width;
    const tx = W/2 - totalW2/2;
    ctx.textAlign = 'left';
    ctx.fillStyle = timerCol;
    ctx.fillText(timerStr, tx, by+bh+15);
    ctx.fillStyle = 'rgba(80,150,220,0.75)';
    ctx.fillText(suffix, tx + ctx.measureText(timerStr).width, by+bh+15);
    ctx.textAlign = 'center';
  }

  if (floodPct > 0.6) {
    const p = (Math.sin(frameTime*3.5)+1)/2;
    ctx.fillStyle = `rgba(30,80,200,${0.02+p*.04})`;
    ctx.fillRect(0,0,W,H);
  }

  // Active effects strip
  const now = frameTime;
  const effs = activeEffects.filter(e => e.endTime > now);
  if (effs.length > 0) {
    let ex = 8;
    const ey = H - 44;
    ctx.textAlign = 'left';
    for (const eff of effs) {
      const timeLeft = eff.endTime - now;
      const fading   = timeLeft < 2.5 && Math.sin(now * 9) <= 0;
      ctx.globalAlpha = fading ? 0.1 : 1.0;
      const meta = EFFECT_META[eff.type];
      const label = `${meta.label} ${Math.ceil(timeLeft)}s`;
      const tw    = ctx.measureText(label).width + 18;
      ctx.fillStyle = meta.color + '28';
      ctx.beginPath(); ctx.roundRect(ex, ey, tw, 22, 4); ctx.fill();
      ctx.strokeStyle = meta.color + 'aa'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(ex, ey, tw, 22, 4); ctx.stroke();
      ctx.font = 'bold 10px monospace'; ctx.fillStyle = meta.color;
      ctx.fillText(label, ex+9, ey+15);
      ex += tw + 6;
    }
    ctx.globalAlpha = 1.0;
  }
}

// ─── DRAW: END SCREEN ────────────────────────────────────────────────────────
function drawEndScreen(won) {
  // Hopping ball drawn before the overlay — subtle, no glow
  // Clipped below y=44 so it sneaks under the flood meter rather than crossing it
  if (won && winBall) {
    const hopT = Math.pow(Math.abs(Math.sin(winBall.t * Math.PI * 3.0)), 0.5);
    const yOff  = -34 * hopT;
    const scale = 1 + 0.55 * hopT;
    const bx = winBall.x, by = winBall.y + yOff;
    const r = 11 * scale;

    // Fade out as the ball approaches the HUD zone — looks like it slides under
    const hudY = 44;
    const fadeZone = 36;
    const alpha = by < hudY ? 0 : by < hudY + fadeZone ? (by - hudY) / fadeZone : 1;

    if (alpha > 0) {
      ctx.save();
      ctx.globalAlpha = alpha;
      const grad = ctx.createRadialGradient(bx - 3, by - 3, 1, bx, by, r);
      grad.addColorStop(0, '#b8ffcc');
      grad.addColorStop(1, '#27c745');
      ctx.beginPath();
      ctx.arc(bx, by, r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    }
  }

  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 52px monospace';
  ctx.fillStyle = won ? '#3ecf3e' : '#3a9eea';
  ctx.fillText(won ? 'YOU ESCAPE!' : 'YOU DISSOLVED', W/2, H/2-12);
  ctx.font = '14px monospace'; ctx.fillStyle = '#555';
  ctx.fillText(won ? 'Enter  →  new maze' : 'Enter  →  try again (same maze)', W/2, H/2+28);
  ctx.fillText(won ? 'R  →  same maze' : 'N  →  new maze', W/2, H/2+52);
}

// ─── RESET ───────────────────────────────────────────────────────────────────
function softReset() {
  // Restore all gates that were opened during this run
  for (const [c, r] of savedGates) MAP[r][c] = 2;
  computeFlood();
  player.x = CX+0.5; player.y = CY+0.5;
  currentFloodDepth = -(floodBase() * 3);
  gameWon = gameLost = false;
  gateModal = null;
  sparks.length = 0;
  moving = false; walkTimer = 0; floodStarted = false;
  dissolveStartTime = -1; winBall = null;
  activeEffects = [];
  smokeGates = {};
  gatePuzzles = {};
}

function reset() {
  runSeed = Date.now() >>> 0;
  MAP = makeMap();
  savedGates = MAP.flatMap((row, r) => row.map((v, c) => v === 2 ? [c, r] : null).filter(Boolean));
  softReset();
}

document.getElementById('restart-btn').addEventListener('click', softReset);
document.getElementById('newmaze-btn').addEventListener('click', reset);
document.getElementById('cheatsheet-btn').addEventListener('click', () => { showCheatsheet = !showCheatsheet; });
const toggleMode = () => { hardMode = !hardMode; setToggle(); reset(); };
document.getElementById('toggle-compare').addEventListener('click', toggleMode);
document.getElementById('toggle-gates').addEventListener('click',   toggleMode);
function setToggle() {
  document.getElementById('toggle-compare').classList.toggle('active', !hardMode);
  document.getElementById('toggle-gates').classList.toggle('active', hardMode);
}

// ─── LOOP ────────────────────────────────────────────────────────────────────
let prevTs = null;
function loop(ts) {
  const dt = prevTs !== null ? Math.min(0.05, (ts-prevTs)/1000) : 0;
  prevTs = ts; frameTime += dt;


  if (!gameWon && !gameLost) {
    if (floodStarted && !showIntro && !hasEffect('FREEZE')) {
      const elapsed = Math.max(0, currentFloodDepth) / floodBase();
      const rampFrac = Math.min(1, elapsed / 45);
      const rate = floodBase() + (floodMax() - floodBase()) * rampFrac;
      currentFloodDepth += rate * dt;
    }
    updatePlayer(dt);
    // Expire smoke gates after 12 seconds
    const now12 = performance.now();
    for (const key of Object.keys(smokeGates)) {
      if (now12 - smokeGates[key].spawnTime > 12000) delete smokeGates[key];
    }
  }

  // Win ball physics — cute hops in facing direction
  if (gameWon && winBall) {
    winBall.t += dt;
    winBall.x += winBall.vx * dt;
    winBall.y += winBall.vy * dt;
    if (winBall.x < -60 || winBall.x > W + 60 || winBall.y < -60 || winBall.y > H + 60) winBall = null;
  }

  for (let i = sparks.length-1; i >= 0; i--) {
    sparks[i].p += dt * 2.8;
    if (sparks[i].p >= 1) sparks.splice(i, 1);
  }

  // Live door preview — animate slides toward open/closed target while puzzling
  if (gateModal && gateModal.phase === 'puzzle') {
    const m2 = gateModal;
    const blueTarget = (m2.slot1 && m2.slot2 && evalPuzzle(m2, m2.blueVal)) ? 1 : 0;
    const redTarget  = (m2.slot1 && m2.slot2 && evalPuzzle(m2, m2.redVal))  ? 1 : 0;
    const spd = 3.5 * dt;
    m2.blueSlide = blueTarget > m2.blueSlide ? Math.min(blueTarget, m2.blueSlide + spd) : Math.max(blueTarget, m2.blueSlide - spd);
    m2.redSlide  = redTarget  > m2.redSlide  ? Math.min(redTarget,  m2.redSlide  + spd) : Math.max(redTarget,  m2.redSlide  - spd);
  }

  drawMaze();
  if (hasEffect('DARKNESS')) {
    const lightR = 85;
    const grad = ctx.createRadialGradient(W/2, H/2, lightR * 0.55, W/2, H/2, lightR * 1.35);
    grad.addColorStop(0,   'rgba(0,0,0,0)');
    grad.addColorStop(1,   'rgba(0,0,0,0.96)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
  drawHUD();
  if (gateModal)       drawGateModal();
  if (showCheatsheet)  drawCheatsheet();
  if (gameWon)         drawEndScreen(true);
  if (gameLost)        drawEndScreen(false);
  if (showIntro)       drawIntro();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
